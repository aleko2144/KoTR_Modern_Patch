[COMMON]
DisplayConsole = 1

; Workaround to fix AI-car behaviour on narrow roads
; Minimal game version - 7.4
[AI_CAR]
HookEnabled = 1
loop_dist   = 25.0
loop_incr   = 05.0
max_width   = 10.0

; External camera tweaks.
; Minimal game version - 6.6
[EXT_CAMERA]
HookEnabled = 1
interp_coeff   = 0.35
rotation_coeff = 0.70
change_init_zoom = 1

; Corrects semi-trailers physics behaviour
; Minimal game version - 7.0
[STRAILER_PHY]
HookEnabled = 1
tractor_steer_coeff = 1.7
tractor_coeff  = 0.8
strailer_coeff = 4.5

[PATCHES]
;;;;;
; Patches for v6.6 - 8.2

; Fixes 1-second freezes when entering Greystone and improves loading times.
QueueSortingFix = 1

; Adjustes collision constants to reduce "sticking" between dynamic objects.
CollisionsFix = 1

; Fixes bugs in the upgrade system, such as fuel disappearing when vehicles switches
; with an additional tank is installed, visual disappearance of installed upgrades, etc.
; Warning! This is experimental patch.
TechSystemFix = 1

; Fixes the display of the selected gear higher than 9 in the top panel of the interface.
InfoPanelFix = 1
;;;;;

; Fixes dust particles direction
; Minimal game version - 6.9
DustParticlesFix = 1

; Fixes cabin positions bug.
; Minimal game version - 8.0
CabinCamFix = 1
